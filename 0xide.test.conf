# Test config for local development — not installed anywhere, just loaded
# straight from the repo:
#
#   OXIDE_CONFIG=./0xide.test.conf OXIDE_MOD=alt cargo nested -- foot
#
# (OXIDE_MOD=alt still overrides `modifier` below, same as with any config.)

modifier = super
gap = 10
background = 0.0 0.6 0.6

bind = MOD, Return, spawn, kitty
bind = MOD, Q, close
bind = MOD SHIFT, Q, quit
bind = MOD, J, focusnext
bind = MOD, K, focusprev
bind = MOD, 1, workspace, 1
bind = MOD SHIFT, 1, movetoworkspace, 1

# Screenshot bindings (quickshell capture menu + direct area capture).
bind = , Print, spawn, ~/.local/bin/capture-menu
bind = SHIFT, Print, spawn, ~/.local/bin/capture-action screenshot-area
